<!DOCTYPE html>
<html>
<head>
    <title>Test Transfer API</title>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .input-group { display: flex; gap: 10px; margin: 10px 0; }
        .input-group input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Transfer API</h1>
        
        <div id="stock-list"></div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const api = axios.create({
            baseURL: 'http://localhost:3000/api',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            }
        });

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function loadStock() {
            try {
                log('Loading stock...');
                const response = await api.get('/stock');
                log(`Stock loaded: ${response.data.length} items`, 'success');
                renderStockList(response.data);
            } catch (error) {
                log(`Error loading stock: ${error.message}`, 'error');
                log(`Error details: ${JSON.stringify(error.response?.data || error.message)}`, 'error');
            }
        }

        function renderStockList(stock) {
            const container = document.getElementById('stock-list');
            container.innerHTML = '<h2>Stock Items</h2>';
            
            stock.forEach((item, index) => {
                const div = document.createElement('div');
                div.style.cssText = 'border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 4px;';
                
                div.innerHTML = `
                    <div><strong>${item.product?.name || 'N/A'}</strong> (${item.product?.sku || 'N/A'})</div>
                    <div>Current location: ${item.location?.code || 'None'}</div>
                    <div>Quantity: ${item.quantity}</div>
                    <div class="input-group">
                        <input type="text" id="from-${index}" placeholder="From location" value="${item.location?.code || ''}" />
                        <input type="text" id="to-${index}" placeholder="To location (e.g., B02-02-02)" />
                        <input type="number" id="qty-${index}" placeholder="Quantity" min="1" max="${item.quantity}" value="1" />
                        <button class="btn btn-success" onclick="testTransfer('${item.product._id}', ${index})">Test Transfer</button>
                    </div>
                `;
                
                container.appendChild(div);
            });
        }

        async function testTransfer(productId, index) {
            const fromLocation = document.getElementById(`from-${index}`).value.trim();
            const toLocation = document.getElementById(`to-${index}`).value.trim();
            const quantity = parseInt(document.getElementById(`qty-${index}`).value);
            
            if (!fromLocation || !toLocation || !quantity) {
                log('Please fill all fields', 'error');
                return;
            }
            
            if (fromLocation === toLocation) {
                log('From and To locations must be different', 'error');
                return;
            }
            
            try {
                log(`Testing transfer: productId=${productId}, from=${fromLocation}, to=${toLocation}, qty=${quantity}`);
                
                const response = await api.post('/stock/transfer', {
                    productId: productId,
                    fromLocation: fromLocation,
                    toLocation: toLocation,
                    quantity: quantity
                });
                
                log(`Transfer successful! Status: ${response.status}`, 'success');
                log(`Response: ${JSON.stringify(response.data, null, 2)}`, 'success');
                
                // Reload stock to show updated data
                await loadStock();
                
            } catch (error) {
                log(`Transfer failed: ${error.message}`, 'error');
                log(`Error details: ${JSON.stringify(error.response?.data || error.message)}`, 'error');
            }
        }

        // Load stock when page loads
        loadStock();
    </script>
</body>
</html>
