<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Omie - Teste UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div id="app">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Teste WMS Omie</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Status da API</h2>
            <div id="api-status" class="text-gray-600">Verificando...</div>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-gray-800">Estoque Sincronizado</h2>
                <button onclick="syncWithOmie()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                    Sincronizar com Omie
                </button>
            </div>
            
            <div id="stock-list" class="space-y-4">
                <div class="text-gray-500">Carregando...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        async function checkAPI() {
            try {
                const response = await fetch(`${API_BASE}/stock`);
                if (response.ok) {
                    document.getElementById('api-status').innerHTML = 
                        '<span class="text-green-600">✅ API conectada com sucesso</span>';
                    loadStock();
                } else {
                    throw new Error('API não respondeu corretamente');
                }
            } catch (error) {
                document.getElementById('api-status').innerHTML = 
                    `<span class="text-red-600">❌ Erro: ${error.message}</span>`;
            }
        }

        async function loadStock() {
            try {
                const response = await fetch(`${API_BASE}/stock`);
                const stock = await response.json();
                
                const stockList = document.getElementById('stock-list');
                
                if (stock.length === 0) {
                    stockList.innerHTML = '<div class="text-gray-500">Nenhum produto em estoque</div>';
                    return;
                }

                stockList.innerHTML = stock.map(item => `
                    <div class="border rounded-lg p-4 hover:bg-gray-50">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-semibold text-gray-900">${item.product.name}</h3>
                                <p class="text-sm text-gray-500">SKU: ${item.product.sku}</p>
                                <p class="text-sm text-gray-500">Omie ID: ${item.product.omieId}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-blue-600">${item.quantity}</div>
                                <div class="text-sm text-gray-500">unidades</div>
                            </div>
                        </div>
                        <div class="mt-3 flex items-center justify-between">
                            <div class="flex items-center">
                                <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                                <span class="text-sm text-gray-600">
                                    ${item.location ? `Local: ${item.location.code} - ${item.location.description}` : 'Não endereçado'}
                                </span>
                            </div>
                            <div class="text-xs text-gray-400">
                                Atualizado: ${new Date(item.lastUpdated).toLocaleString('pt-BR')}
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                document.getElementById('stock-list').innerHTML = 
                    `<div class="text-red-600">Erro ao carregar estoque: ${error.message}</div>`;
            }
        }

        async function syncWithOmie() {
            const button = event.target;
            button.disabled = true;
            button.textContent = 'Sincronizando...';

            try {
                const response = await fetch(`${API_BASE}/stock/sync-with-omie`, {
                    method: 'POST'
                });
                const result = await response.json();

                if (response.ok) {
                    alert(`✅ ${result.message}`);
                    loadStock();
                } else {
                    throw new Error(result.error || 'Erro na sincronização');
                }
            } catch (error) {
                alert(`❌ Erro: ${error.message}`);
            } finally {
                button.disabled = false;
                button.textContent = 'Sincronizar com Omie';
            }
        }

        // Iniciar
        checkAPI();
    </script>
</body>
</html>
